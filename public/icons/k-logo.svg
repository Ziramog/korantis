<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-label="Korantis K">
  <!--
    KORANTIS — K Icon (vector)
    3 stroke-based paths for future animation:
      #k-stem     → vertical line (x = 16)
      #k-upper    → upper diagonal (junction → top-right)
      #k-lower    → lower diagonal (junction → bottom-right)
    All paths use stroke="currentColor" for CSS color control.
  -->
  <g id="korantis-k" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical stem: x = 16, y: 8 → 56 -->
    <path id="k-stem" d="M16 8 L16 56" />
    <!-- Upper diagonal: from (16, 32) to (48, 8) -->
    <path id="k-upper" d="M16 32 L48 8" />
    <!-- Lower diagonal: from (16, 32) to (48, 56) -->
    <path id="k-lower" d="M16 32 L48 56" />
  </g>
</svg>
